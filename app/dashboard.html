<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 선생님 모니터링 대시보드 - 영양 분석관 공주</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&family=Gamja+Flower&family=Gowun+Dodum&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            font-family: 'Noto Sans KR', sans-serif;
            color: #e2e8f0;
        }

        /* ---- 헤더 ---- */
        .dashboard-header {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }
        .header-title {
            font-family: 'Gamja Flower', cursive;
            font-size: 1.4rem;
            color: #ffd700;
        }
        .header-subtitle {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
            margin-top: 2px;
        }
        .live-badge {
            display: flex; align-items: center; gap: 6px;
            background: rgba(34,197,94,0.15);
            border: 1px solid rgba(34,197,94,0.4);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 0.85rem; color: #4ade80;
            font-weight: 600;
        }
        .live-dot {
            width: 8px; height: 8px;
            background: #4ade80; border-radius: 50%;
            animation: livePulse 1.5s infinite;
        }
        @keyframes livePulse {
            0%,100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.7); }
        }

        /* ---- 통계 카드 ---- */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding: 16px 20px;
        }
        .stat-card {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            transition: transform 0.2s;
        }
        .stat-card:hover { transform: translateY(-2px); }
        .stat-icon { font-size: 1.8rem; margin-bottom: 6px; }
        .stat-num {
            font-size: 1.8rem; font-weight: 900;
            background: linear-gradient(135deg, #ffd700, #ff9500);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .stat-label { font-size: 0.78rem; color: rgba(255,255,255,0.5); margin-top: 4px; }

        /* ---- 필터/검색 ---- */
        .toolbar {
            padding: 0 20px 12px;
            display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
        }
        .toolbar input {
            flex: 1; min-width: 200px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            padding: 10px 16px;
            color: white; font-size: 0.9rem; outline: none;
            transition: border-color 0.3s;
        }
        .toolbar input:focus { border-color: #ffd700; }
        .toolbar input::placeholder { color: rgba(255,255,255,0.35); }
        .filter-btn {
            padding: 10px 16px; border-radius: 10px; border: none;
            font-size: 0.85rem; cursor: pointer; font-weight: 600;
            transition: all 0.2s;
        }
        .filter-btn.active {
            background: linear-gradient(135deg,#6366f1,#8b5cf6);
            color: white;
        }
        .filter-btn:not(.active) {
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.6);
        }

        /* ---- 학생 테이블 ---- */
        .table-wrapper {
            padding: 0 20px 30px;
        }
        .student-table {
            width: 100%; border-collapse: separate; border-spacing: 0 8px;
        }
        .student-table thead th {
            background: rgba(255,255,255,0.05);
            padding: 10px 14px;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: rgba(255,255,255,0.4);
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .student-row {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            transition: background 0.2s;
            cursor: pointer;
        }
        .student-row:hover { background: rgba(255,255,255,0.1); }
        .student-row td {
            padding: 12px 14px;
            vertical-align: middle;
        }
        .student-row td:first-child { border-radius: 12px 0 0 12px; }
        .student-row td:last-child { border-radius: 0 12px 12px 0; }

        /* 이름 셀 */
        .student-name {
            font-weight: 700; font-size: 1rem; color: #f1f5f9;
        }
        .student-time {
            font-size: 0.75rem; color: rgba(255,255,255,0.4); margin-top: 2px;
        }

        /* 진행 바 */
        .progress-wrap {
            display: flex; align-items: center; gap: 8px;
        }
        .progress-bar-bg {
            flex: 1; height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 99px; overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%; border-radius: 99px;
            background: linear-gradient(90deg, #6366f1, #a855f7, #ec4899);
            transition: width 0.5s ease;
        }
        .progress-text { font-size: 0.78rem; color: rgba(255,255,255,0.5); width: 36px; }

        /* 상태 뱃지 */
        .status-badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 4px 10px; border-radius: 20px;
            font-size: 0.78rem; font-weight: 600;
        }
        .status-not-started { background: rgba(100,116,139,0.2); color: #94a3b8; }
        .status-in-progress { background: rgba(251,191,36,0.15); color: #fbbf24; }
        .status-completed { background: rgba(34,197,94,0.15); color: #4ade80; }

        /* 방 진행 표시 */
        .rooms-dots {
            display: flex; gap: 4px;
        }
        .room-dot {
            width: 22px; height: 22px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.65rem; font-weight: 700;
        }
        .room-dot.cleared { background: #4ade80; color: #052e16; }
        .room-dot.not-cleared { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.3); }

        /* 소감 셀 */
        .feedback-preview {
            max-width: 200px;
            font-size: 0.82rem;
            color: rgba(255,255,255,0.6);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .no-feedback { color: rgba(255,255,255,0.25); font-style: italic; }

        /* 별점 */
        .star-display { color: #fbbf24; font-size: 0.85rem; }

        /* 빈 상태 */
        .empty-state {
            text-align: center; padding: 60px 20px;
            color: rgba(255,255,255,0.3);
        }
        .empty-state .empty-icon { font-size: 4rem; margin-bottom: 16px; }
        .empty-state p { font-size: 1rem; font-family: 'Gamja Flower', cursive; }

        /* 소감 상세 모달 */
        .feedback-modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.7); z-index: 9999;
            align-items: center; justify-content: center;
        }
        .feedback-modal-overlay.active { display: flex; }
        .feedback-modal {
            background: linear-gradient(135deg, #1e1b4b, #312e81);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 28px;
            max-width: 480px; width: 90%;
            position: relative;
        }
        .feedback-modal h3 { color: #ffd700; font-family: 'Gamja Flower', cursive; font-size: 1.2rem; margin-bottom: 16px; }
        .feedback-modal .feedback-full-text {
            background: rgba(255,255,255,0.07);
            border-radius: 12px; padding: 16px;
            font-family: 'Gowun Dodum', sans-serif;
            line-height: 1.7; color: #e2e8f0; font-size: 0.95rem;
            white-space: pre-wrap;
        }
        .modal-close {
            position: absolute; top: 14px; right: 16px;
            background: none; border: none; color: rgba(255,255,255,0.5);
            font-size: 1.3rem; cursor: pointer;
        }

        /* 로딩 스피너 */
        .loading {
            text-align: center; padding: 60px;
            color: rgba(255,255,255,0.5); font-family: 'Gamja Flower', cursive;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255,215,0,0.2);
            border-top-color: #ffd700;
            border-radius: 50%; animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Firebase 경고 */
        .firebase-warning {
            margin: 12px 20px;
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.4);
            border-radius: 12px;
            padding: 14px 18px;
            font-size: 0.85rem; color: #fca5a5;
            font-family: 'Gowun Dodum', sans-serif;
            line-height: 1.6;
        }

        /* 반응형 */
        @media (max-width: 768px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .student-table thead th:nth-child(n+5) { display: none; }
            .student-row td:nth-child(n+5) { display: none; }
        }
    </style>
</head>
<body>

<!-- 헤더 -->
<header class="dashboard-header">
    <div>
        <div class="header-title">📊 선생님 실시간 모니터링</div>
        <div class="header-subtitle">영양 분석관 공주 - 학생 진행 현황</div>
    </div>
    <div class="live-badge">
        <div class="live-dot"></div>
        LIVE
    </div>
</header>

<!-- Firebase 경고 (설정 안 됐을 때만 표시) -->
<div id="firebase-warning" class="firebase-warning" style="display:none;">
    ⚠️ <strong>Firebase가 설정되지 않았습니다!</strong><br>
    <code>firebase-config.js</code> 파일을 열어 Firebase 프로젝트 정보를 입력해주세요.<br>
    👉 <a href="https://console.firebase.google.com/" target="_blank" style="color:#fbbf24;">Firebase Console 바로가기</a>
</div>

<!-- 통계 카드 -->
<div class="stats-row">
    <div class="stat-card">
        <div class="stat-icon">👥</div>
        <div class="stat-num" id="stat-total">0</div>
        <div class="stat-label">전체 학생</div>
    </div>
    <div class="stat-card">
        <div class="stat-icon">🔥</div>
        <div class="stat-num" id="stat-active">0</div>
        <div class="stat-label">진행 중</div>
    </div>
    <div class="stat-card">
        <div class="stat-icon">🎉</div>
        <div class="stat-num" id="stat-completed">0</div>
        <div class="stat-label">완료</div>
    </div>
    <div class="stat-card">
        <div class="stat-icon">⭐</div>
        <div class="stat-num" id="stat-avg-rating">-</div>
        <div class="stat-label">평균 별점</div>
    </div>
</div>

<!-- 필터 -->
<div class="toolbar">
    <input type="text" id="search-input" placeholder="🔍 학생 이름 검색..." oninput="filterStudents()">
    <button class="filter-btn active" id="filter-all" onclick="setFilter('all')">전체</button>
    <button class="filter-btn" id="filter-active" onclick="setFilter('active')">진행 중 🔥</button>
    <button class="filter-btn" id="filter-completed" onclick="setFilter('completed')">완료 ✅</button>
    <button class="filter-btn" id="filter-feedback" onclick="setFilter('feedback')">소감 있음 💬</button>
</div>

<!-- 학생 테이블 -->
<div class="table-wrapper">
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>학생 데이터 불러오는 중...</p>
    </div>
    <table class="student-table" id="student-table" style="display:none;">
        <thead>
            <tr>
                <th>학생</th>
                <th>진행 방</th>
                <th>진행률</th>
                <th>상태</th>
                <th>현재 단계</th>
                <th>별점</th>
                <th>활동 소감</th>
            </tr>
        </thead>
        <tbody id="student-tbody"></tbody>
    </table>
    <div id="empty-state" class="empty-state" style="display:none;">
        <div class="empty-icon">🏫</div>
        <p>아직 접속한 학생이 없어요!<br>학생들이 게임을 시작하면 여기에 나타납니다.</p>
    </div>
</div>

<!-- 소감 상세 모달 -->
<div class="feedback-modal-overlay" id="feedback-modal">
    <div class="feedback-modal">
        <button class="modal-close" onclick="closeFeedbackModal()">✕</button>
        <h3 id="modal-student-name">학생 소감</h3>
        <div class="star-display" id="modal-rating" style="margin-bottom:12px;font-size:1.1rem;"></div>
        <div class="feedback-full-text" id="modal-feedback-text"></div>
    </div>
</div>

<script>
// ===========================
// 대시보드 상태
// ===========================
let allStudents = [];
let currentFilter = 'all';
let searchQuery = '';

// 방 이름
const roomNames = ['탄수화물', '단백질', '지방', '비타민', '무기질', '물'];

// 타임스탬프 → 상대 시간
function timeAgo(ts) {
    if (!ts) return '-';
    const date = ts.toDate ? ts.toDate() : new Date(ts);
    const diff = Math.floor((Date.now() - date.getTime()) / 1000);
    if (diff < 60) return `${diff}초 전`;
    if (diff < 3600) return `${Math.floor(diff/60)}분 전`;
    if (diff < 86400) return `${Math.floor(diff/3600)}시간 전`;
    return `${Math.floor(diff/86400)}일 전`;
}

// 별점 → 이모지
function starsToEmoji(rating) {
    if (!rating || rating === 0) return '<span style="color:rgba(255,255,255,0.25)">-</span>';
    return '⭐'.repeat(rating) + `<span style="font-size:0.75rem;color:rgba(255,255,255,0.4);"> (${rating}/5)</span>`;
}

// 상태 뱃지
function getStatusBadge(student) {
    if (student.completed) {
        return '<span class="status-badge status-completed">🎉 완료</span>';
    } else if (student.clearedRooms && student.clearedRooms.length > 0) {
        return '<span class="status-badge status-in-progress">🔥 진행 중</span>';
    } else {
        return '<span class="status-badge status-not-started">💤 시작 전</span>';
    }
}

// 방 진행 점 표시
function getRoomDots(clearedRooms) {
    const cleared = clearedRooms || [];
    return Array.from({length: 6}, (_, i) => {
        const isCleared = cleared.includes(i + 1);
        return `<div class="room-dot ${isCleared ? 'cleared' : 'not-cleared'}" title="${roomNames[i]}">${i+1}</div>`;
    }).join('');
}

// 진행률 계산
function getProgress(student) {
    const cleared = (student.clearedRooms || []).length;
    const extra = student.completed ? 1 : 0;
    return Math.min(100, Math.round((cleared / 6) * 100));
}

// ===========================
// 테이블 렌더링
// ===========================
function renderStudents() {
    const tbody = document.getElementById('student-tbody');
    
    // 필터 적용
    let filtered = allStudents.filter(s => {
        const matchSearch = !searchQuery || s.name.toLowerCase().includes(searchQuery.toLowerCase());
        let matchFilter = true;
        if (currentFilter === 'active') matchFilter = !s.completed && (s.clearedRooms || []).length > 0;
        if (currentFilter === 'completed') matchFilter = s.completed;
        if (currentFilter === 'feedback') matchFilter = !!s.feedback;
        return matchSearch && matchFilter;
    });

    // 완료 먼저, 그 다음 진행 중, 미시작 순
    filtered.sort((a, b) => {
        const score = s => s.completed ? 2 : (s.clearedRooms||[]).length > 0 ? 1 : 0;
        return score(b) - score(a) || (b.score||0) - (a.score||0);
    });

    if (filtered.length === 0) {
        document.getElementById('student-table').style.display = 'none';
        document.getElementById('empty-state').style.display = 'block';
        return;
    }

    document.getElementById('student-table').style.display = 'table';
    document.getElementById('empty-state').style.display = 'none';

    tbody.innerHTML = filtered.map(s => {
        const progress = getProgress(s);
        const startTime = s.startedAt ? timeAgo(s.startedAt) : '-';
        const feedbackPreview = s.feedback
            ? `<span class="feedback-preview" title="${s.feedback.replace(/"/g,'&quot;')}">${s.feedback}</span>`
            : '<span class="no-feedback">아직 없음</span>';
        
        return `
        <tr class="student-row" onclick="showFeedbackModal('${s.id}')">
            <td>
                <div class="student-name">${s.name}</div>
                <div class="student-time">⏰ ${startTime}</div>
            </td>
            <td><div class="rooms-dots">${getRoomDots(s.clearedRooms)}</div></td>
            <td>
                <div class="progress-wrap">
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width:${progress}%"></div>
                    </div>
                    <span class="progress-text">${progress}%</span>
                </div>
            </td>
            <td>${getStatusBadge(s)}</td>
            <td style="font-size:0.82rem;color:rgba(255,255,255,0.6);">${s.currentStage || '-'}</td>
            <td class="star-display">${starsToEmoji(s.rating)}</td>
            <td>${feedbackPreview}</td>
        </tr>`;
    }).join('');

    // 통계 업데이트
    updateStats();
}

function updateStats() {
    const total = allStudents.length;
    const completed = allStudents.filter(s => s.completed).length;
    const active = allStudents.filter(s => !s.completed && (s.clearedRooms||[]).length > 0).length;
    const rated = allStudents.filter(s => s.rating && s.rating > 0);
    const avgRating = rated.length > 0
        ? (rated.reduce((sum, s) => sum + s.rating, 0) / rated.length).toFixed(1)
        : '-';

    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-active').textContent = active;
    document.getElementById('stat-completed').textContent = completed;
    document.getElementById('stat-avg-rating').textContent = avgRating;
}

// ===========================
// 필터 / 검색
// ===========================
function setFilter(filter) {
    currentFilter = filter;
    ['all','active','completed','feedback'].forEach(f => {
        document.getElementById(`filter-${f}`)?.classList.toggle('active', f === filter);
    });
    renderStudents();
}

function filterStudents() {
    searchQuery = document.getElementById('search-input').value;
    renderStudents();
}

// ===========================
// 소감 모달
// ===========================
function showFeedbackModal(studentId) {
    const s = allStudents.find(s => s.id === studentId);
    if (!s || !s.feedback) return;
    document.getElementById('modal-student-name').textContent = `✍️ ${s.name}의 소감`;
    document.getElementById('modal-rating').innerHTML = starsToEmoji(s.rating);
    document.getElementById('modal-feedback-text').textContent = s.feedback;
    document.getElementById('feedback-modal').classList.add('active');
}

function closeFeedbackModal() {
    document.getElementById('feedback-modal').classList.remove('active');
}

// ===========================
// Firebase 실시간 리스너
// ===========================
function startRealtimeListener() {
    if (!db) {
        document.getElementById('loading').innerHTML = `
            <div style="font-size:3rem;">⚠️</div>
            <p style="margin-top:12px;">Firebase가 연결되지 않았어요!<br>firebase-config.js를 설정해주세요.</p>
        `;
        document.getElementById('firebase-warning').style.display = 'block';
        return;
    }

    db.collection('sessions').orderBy('startedAt', 'desc').onSnapshot(snapshot => {
        document.getElementById('loading').style.display = 'none';

        allStudents = snapshot.docs.map(doc => ({
            id: doc.id,
            ...doc.data()
        }));

        renderStudents();
    }, err => {
        console.error('Firestore 오류:', err);
        document.getElementById('loading').innerHTML = `
            <div style="font-size:2rem;color:#f87171;">❌ 데이터 불러오기 실패</div>
            <p style="margin-top:8px;font-size:0.85rem;color:rgba(255,255,255,0.4);">${err.message}</p>
        `;
    });
}

// ===========================
// 초기화
// ===========================
document.addEventListener('DOMContentLoaded', () => {
    const ready = initFirebase();
    startRealtimeListener();
});
</script>
</body>
</html>
