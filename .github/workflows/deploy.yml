name: GitHub Pages 배포

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: GitHub Pages 설정
        uses: actions/configure-pages@v5

      - name: 이미지·영상 app 폴더로 복사
        run: |
          cp *.png app/ 2>/dev/null || true
          cp *.mp4 app/ 2>/dev/null || true

      - name: app 폴더 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: './app'

      - name: 배포하기
        id: deployment
        uses: actions/deploy-pages@v4
